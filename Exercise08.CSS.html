<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Tập 8 - Form Liên Hệ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #ffffff;
        }
        .form-container {
            max-width: 600px;
        }
        .main-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .input-line {
            margin-bottom: 15px;
        }
        .input-line label {
            display: block;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .input-line input[type="text"],
        .input-line input[type="email"] {
            width: 250px;
            height: 25px;
            border: 1px solid #767676;
            padding: 0 5px;
            outline: none;
        }
        .input-line textarea {
            width: 450px;
            border: 1px solid #767676;
            padding: 5px;
            outline: none;
            resize: none; 
        }
        .button-line {
            margin-top: 15px;
        }
        .button-line button {
            padding: 2px 15px;
            font-size: 14px;
            background-color: #f0f0f0;
            border: 1px solid #767676;
            cursor: pointer;
        }
        .button-line button:hover {
            background-color: #e5e5e5;
        }
    </style>
</head>
    <div class="form-container">
        <h1 class="main-title">Liên Hệ Với Chúng Tôi</h1>
        <form action="#" method="POST">
            <div class="input-line">
                <label for="fullname">Họ và tên:</label>
                <input type="text" id="fullname" name="fullname">
            </div>
            <div class="input-line">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="input-line">
                <label for="message">Tin nhắn:</label>
                <textarea id="message" name="message" rows="8"></textarea>
            </div>
            <div class="button-line">
                <button type="submit">Gửi</button>
            </div>
        </form>
    </div>
</body>
</html>
