<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập: Tạo table đơn giản</title>
    <style>
        table {
            border: 1px solid black;
            border-collapse: separate;
            border-spacing: 15px;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 15px 20px;
            text-align: center;
            min-width: 100px;
        }
        th {
            font-weight: bold;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th><strong>Tên</strong></th>
                <th><strong>Tuổi</strong></th>
                <th><strong>Nghề nghiệp</strong></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>An</td>
                <td>25</td>
                <td>Lập trình viên</td>
            </tr>
            <tr>
                <td>Bảo</td>
                <td>30</td>
                <td>Kỹ sư xây dựng</td>
            </tr>
            <tr>
                <td>Chi</td>
                <td>22</td>
                <td>Sinh viên</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
