<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài tập Table sử dụng thuộc tính Rowspan</title>
  <style>
    table {
      borde:r: 1px solid black;
      border-collapse: collapse;
      width: 100%;
      max-width: 800px;
    }
    th, td {
      border: 1px solid black;
      padding: 15px;
      text-align: center;
    }
  </style>
</head>
<body>
  <table>
    <tr>
      <th>Loại sản phẩm</th>
      <th>Tên sản phẩm</th>
      <th>Giá</th>
    </tr>
    <tr>
      <td rowspan="2">Điện tử</td>
      <td>Laptop</td>
      <td>15.000.000</td>
    </tr>
    <tr>
      <td>Điện thoại</td>
      <td>8.000.000</td>
    </tr>
    <tr>
      <td>Gia dụng</td>
      <td>Máy giặt</td>
      <td>5.000.000</td>
    </tr>
  </table>
</body>
</html>
